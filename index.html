<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Interés Simple</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e3c72;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #2a5298;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #1e3c72;
        }

        .resultado {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f4ff;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Interés Simple</h1>

    <label for="capital">Capital:</label>
    <input type="number" id="capital" placeholder="Ej: 1000">

    <label for="tasa">Tasa (decimal):</label>
    <input type="number" step="0.01" id="tasa" placeholder="Ej: 0.05">

    <label for="tiempo">Tiempo (años):</label>
    <input type="number" step="0.01" id="tiempo" placeholder="Ej: 2">

    <button onclick="calcularInteres()">Calcular</button>

    <div class="resultado" id="resultado"></div>

    <div class="footer">
        Fórmula: I = Capital × Tasa × Tiempo
    </div>
</div>

<script>
    function calcularInteres() {
        const capital = parseFloat(document.getElementById('capital').value);
        const tasa = parseFloat(document.getElementById('tasa').value);
        const tiempo = parseFloat(document.getElementById('tiempo').value);
        const resultadoDiv = document.getElementById('resultado');

        if (isNaN(capital) || isNaN(tasa) || isNaN(tiempo)) {
            resultadoDiv.innerHTML = "⚠️ Por favor ingresa valores válidos.";
            return;
        }

        if (capital <= 0 || tasa < 0 || tiempo <= 0) {
            resultadoDiv.innerHTML = "⚠️ Verifica que los valores sean correctos.";
            return;
        }

        const interes = capital * tasa * tiempo;
        resultadoDiv.innerHTML = `Interés generado: $${interes.toFixed(2)}`;
    }
</script>

</body>
</html>
